<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SVG Draw Playground</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <h1>SVG Draw</h1>
      <div class="actions">
        <button id="copy-svg">Copy SVG</button>
        <button id="download-svg">Download .svg</button>
        <button id="download-png">Download .png</button>
      </div>
    </header>
    <main>
      <section class="pane editor-pane">
        <div id="editor"></div>
        <div id="status" class="status ok">ready</div>
      </section>
      <section class="pane render-pane">
        <div id="render"></div>
      </section>
    </main>
    <script type="module" src="./frontend.ts"></script>
  </body>
</html>
